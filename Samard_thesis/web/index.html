<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Movie &amp; TV Tracker</title>
    <script>
      // Force reload if cached version is detected
      (function() {
        const lastBuild = localStorage.getItem('app-build-version');
        const currentBuild = document.querySelector('meta[name="build-version"]')?.getAttribute('content');
        if (lastBuild && currentBuild && lastBuild !== currentBuild) {
          localStorage.clear();
          window.location.reload();
        }
        if (currentBuild) {
          localStorage.setItem('app-build-version', currentBuild);
        }
      })();
    </script>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
